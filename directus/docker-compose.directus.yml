version: '3.8'

services:
  directus:
    image: directus/directus:10.13.2
    restart: unless-stopped
    ports:
      - "8055:8055"
    environment:
      # Core
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL}

      # Admin user bootstrap
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}

      # DB (you will create this in Coolify)
      DB_CLIENT: pg
      DB_HOST: ${DIRECTUS_DB_HOST}
      DB_PORT: ${DIRECTUS_DB_PORT}
      DB_DATABASE: ${DIRECTUS_DB_DATABASE}
      DB_USER: ${DIRECTUS_DB_USER}
      DB_PASSWORD: ${DIRECTUS_DB_PASSWORD}

      # Storage (local volume)
      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_DRIVER: local
      STORAGE_LOCAL_ROOT: /directus/uploads

      # Optional: allow external embeds/links etc.
      CORS_ENABLED: "true"
      CORS_ORIGIN: ${DIRECTUS_CORS_ORIGIN}

      # Optional: mail (for password resets)
      EMAIL_FROM: ${DIRECTUS_EMAIL_FROM}
      EMAIL_TRANSPORT: ${DIRECTUS_EMAIL_TRANSPORT}
      EMAIL_SMTP_HOST: ${DIRECTUS_EMAIL_SMTP_HOST}
      EMAIL_SMTP_PORT: ${DIRECTUS_EMAIL_SMTP_PORT}
      EMAIL_SMTP_USER: ${DIRECTUS_EMAIL_SMTP_USER}
      EMAIL_SMTP_PASSWORD: ${DIRECTUS_EMAIL_SMTP_PASSWORD}

    volumes:
      - directus_uploads:/directus/uploads

volumes:
  directus_uploads:
